<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timesheet System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container { width: 100%; max-width: 420px; }
        .login-box {
            background: #ffffff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #e8e8e8;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 26px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        .login-header p {
            color: #6b6b6b;
            margin-top: 6px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #d0d0d0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1a1a1a;
            background: #ffffff;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover { background: #333333; }
        .error-message {
            color: #d32f2f;
            text-align: center;
            margin-top: 16px;
            display: none;
            padding: 10px;
            background: #fde8e8;
            border-radius: 6px;
            font-size: 14px;
        }
        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #6b6b6b;
            border-top: 1px solid #e8e8e8;
            padding-top: 20px;
        }
        .demo-credentials {
            margin-top: 12px;
            background: #f8f8f8;
            padding: 14px;
            border-radius: 8px;
            font-size: 13px;
            color: #4a4a4a;
            text-align: left;
            line-height: 1.6;
        }
        .demo-credentials strong { color: #1a1a1a; }
        .demo-credentials .label { font-weight: 600; color: #1a1a1a; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Timesheet System</h1>
                <p>Secure Employee Portal</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" value="employer@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" value="Admin123!" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            
            <div id="errorMessage" class="error-message"></div>
            
            <div class="login-footer">
                <p>Secure 256-bit encrypted connection</p>
                <div class="demo-credentials">
                    <strong>Demo Credentials</strong><br>
                    <span class="label">Employer:</span> employer@company.com / Admin123!<br>
                    <span class="label">Employee:</span> employee@company.com / WelcomeEMP000002!
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://Dleonardeng.ie/api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');
            
            errorEl.style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                if (data.user.role === 'employer') {
                    window.location.href = '/employer.html';
                } else {
                    window.location.href = '/employee.html';
                }
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
