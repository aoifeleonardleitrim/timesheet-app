<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up Your Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .setup-container {
            width: 100%;
            max-width: 480px;
        }
        .setup-box {
            background: #ffffff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #e8e8e8;
        }
        .setup-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .setup-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.3px;
        }
        .setup-header p {
            color: #6b6b6b;
            margin-top: 6px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #d0d0d0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1a1a1a;
            background: #ffffff;
        }
        .password-requirements {
            font-size: 13px;
            color: #6b6b6b;
            margin-top: 6px;
            line-height: 1.4;
        }
        .setup-btn {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .setup-btn:hover {
            background: #333333;
        }
        .setup-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        .message.error {
            display: block;
            background: #fde8e8;
            color: #d32f2f;
            border: 1px solid #fccccc;
        }
        .message.info {
            display: block;
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 16px;
            color: #6b6b6b;
            font-size: 14px;
        }
        .loading.show {
            display: block;
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #6b6b6b;
            border-top: 1px solid #e8e8e8;
            padding-top: 20px;
        }
        .password-strength {
            height: 4px;
            margin-top: 8px;
            border-radius: 2px;
            background: #e8e8e8;
            transition: all 0.3s;
        }
        .password-strength.weak { background: #d32f2f; width: 33%; }
        .password-strength.medium { background: #ed6c02; width: 66%; }
        .password-strength.strong { background: #2e7d32; width: 100%; }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-box">
            <div class="setup-header">
                <h1>Set Up Your Account</h1>
                <p>Create your password to access the Timesheet System</p>
            </div>
            
            <form id="setupForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required minlength="8">
                    <div class="password-requirements">
                        Password must be at least 8 characters
                    </div>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit" class="setup-btn" id="setupBtn">Set Up Account</button>
            </form>
            
            <div id="message" class="message"></div>
            <div id="loading" class="loading">Setting up your account...</div>
            
            <div class="footer">
                <p>This link will expire in 24 hours.</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5001/api';
        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            showMessage('No setup token provided. Please use the link from your email.', 'error');
            document.getElementById('setupBtn').disabled = true;
        }
        
        document.getElementById('password').addEventListener('input', function() {
            const strengthEl = document.getElementById('passwordStrength');
            const password = this.value;
            
            if (password.length === 0) {
                strengthEl.className = 'password-strength';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            if (strength <= 2) {
                strengthEl.className = 'password-strength weak';
            } else if (strength <= 3) {
                strengthEl.className = 'password-strength medium';
            } else {
                strengthEl.className = 'password-strength strong';
            }
        });
        
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageEl = document.getElementById('message');
            const loadingEl = document.getElementById('loading');
            const btn = document.getElementById('setupBtn');
            
            messageEl.className = 'message';
            messageEl.style.display = 'none';
            
            if (password.length < 8) {
                showMessage('Password must be at least 8 characters.', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }
            
            loadingEl.classList.add('show');
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/auth/setup-account`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Account setup successful! You can now log in.', 'success');
                    document.getElementById('setupForm').reset();
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);
                } else {
                    showMessage(data.error || 'An error occurred. Please try again.', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please check your connection and try again.', 'error');
            } finally {
                loadingEl.classList.remove('show');
                btn.disabled = false;
            }
        });
        
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
        }
    </script>
</body>
</html>
